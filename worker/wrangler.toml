name = "room-studio-worker"
main = "src/index.js"
compatibility_date = "2024-12-01"

[vars]
ENVIRONMENT = "production"

[[r2_buckets]]
binding = "R2"
bucket_name = "cerul-social-media"

# Cloudflare native rate limiter — 10 requests per 60s per key (IP)
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 10, period = 60 }
